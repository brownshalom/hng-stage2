version: "3.9"

services:

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  api:
    build: ./api
    container_name: api
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "8000:8000"

  worker:
    build: ./worker
    restart: always
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build: ./frontend
    restart: always
    env_file:
      - .env
    depends_on:
      api:
        condition: service_healthy
    networks:
      - internal
    ports:
      - "3000:3000"

networks:
  internal:
    driver: bridge

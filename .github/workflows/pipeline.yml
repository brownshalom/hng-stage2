name: DevOps CI Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:

# ---------------- LINT ----------------
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          npm install eslint

      - name: Run ESLint
        run: |
          cd frontend
          npx eslint .

      - name: Install Hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile


# ---------------- TEST ----------------
  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -r api/requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          cd api
          pytest --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "SHA_TAG=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          tags: |
            localhost:5000/api:${{ steps.vars.outputs.SHA_TAG }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Worker image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          tags: |
            localhost:5000/worker:${{ steps.vars.outputs.SHA_TAG }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend image with cache
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: |
            localhost:5000/frontend:${{ steps.vars.outputs.SHA_TAG }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push API image
        run: |
          docker push localhost:5000/api:${{ steps.vars.outputs.SHA_TAG }}
          docker push localhost:5000/api:latest

      - name: Push Worker image
        run: |
          docker push localhost:5000/worker:${{ steps.vars.outputs.SHA_TAG }}
          docker push localhost:5000/worker:latest

      - name: Push Frontend image
        run: |
          docker push localhost:5000/frontend:${{ steps.vars.outputs.SHA_TAG }}
          docker push localhost:5000/frontend:latest


# ---------------- SECURITY SCAN ----------------
  security_scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget -y
          wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.50.0_Linux-64bit.deb

      - name: Scan API image
        run: |
          trivy image \
            --severity CRITICAL \
            --format sarif \
            -o trivy.sarif \
            localhost:5000/api:latest

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy.sarif


# ---------------- INTEGRATION TEST ----------------
  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: Run integration test
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID"

          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | jq -r '.status')

            if [ "$STATUS" == "completed" ]; then
              echo "Job completed"
              exit 0
            fi

            sleep 2
          done

          echo "Job timeout"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'

    env:
      API_TOKEN: ${{ secrets.API_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Rolling update deploy
        run: |
          docker compose pull
          docker compose up -d --no-deps --build

      - name: Health check
        run: |
          for i in {1..30}; do
            curl -s http://localhost:8000/health && exit 0
            sleep 2
          done

          echo "Health check failed"
          exit 1
